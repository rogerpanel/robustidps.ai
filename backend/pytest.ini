[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    p0: Critical path tests (config, database, auth)
    p1: Core feature tests (API, features, ingestion)
    p2: Advanced feature tests (drift, firewall, PQ crypto, audit)
    p3: Integration tests (SIEM, supply chain, zero-trust, SDK)
