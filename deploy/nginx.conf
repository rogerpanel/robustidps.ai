# Redirect HTTP to HTTPS
server {
    listen 80 default_server;
    server_name robustidps.ai www.robustidps.ai 37.27.31.70;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2 default_server;
    server_name robustidps.ai www.robustidps.ai 37.27.31.70;

    # SSL certificate (self-signed, valid for Cloudflare Full mode)
    ssl_certificate /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Fonts now self-hosted — no external font-src or style-src needed
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://robustidps.ai ws://robustidps.ai wss://37.27.31.70 ws://37.27.31.70; frame-ancestors 'self';" always;

    # Frontend — serve built React SPA
    root /usr/share/nginx/html;
    index index.html;

    # ── Brotli Compression (preferred — ~25% smaller than gzip) ──────
    # Serve pre-compressed .br files built during Docker image creation
    brotli_static on;

    # ── Gzip Compression (fallback for clients without Brotli) ───────
    gzip on;
    gzip_static on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm
        font/woff2;

    # ── SEO files — serve directly ────────────────────────────────────
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        access_log off;
        log_not_found off;
    }

    # ── Static assets — immutable long cache ──────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Precompressed files (brotli preferred, gzip fallback)
        brotli_static on;
        gzip_static on;
    }

    # ── Font files — long cache + correct MIME type ───────────────────
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API proxy to FastAPI backend ──────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File uploads can be large
        client_max_body_size 100M;
        proxy_read_timeout 300s;

        # Don't buffer API responses
        proxy_buffering off;
    }

    # ── WebSocket proxy for live monitoring ───────────────────────────
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── SPA fallback — serve index.html with short cache ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html should not be cached long (it references hashed assets)
    # NOTE: Kept outside nested block to avoid nginx add_header inheritance
    # issue where nested add_header silently drops ALL parent security headers.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://robustidps.ai ws://robustidps.ai wss://37.27.31.70 ws://37.27.31.70; frame-ancestors 'self';" always;
    }
}
