    <!-- Critical CSS — eliminates flash of unstyled content on slow connections -->
    <style>
      body { margin: 0; background: #0f172a; color: #f8fafc; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      #root { min-height: 100vh; }
      /* Minimal loading state shown before JS hydrates */
      .initial-loader { display: flex; align-items: center; justify-content: center; height: 100vh; }
      .initial-loader svg { width: 24px; height: 24px; animation: spin 1s linear infinite; color: #3b82f6; }

    <div id="root">

    <!-- PWA Service Worker Registration -->
    <script>

        window.addEventListener('load', () => {

            .then(reg => console.log('[PWA] Service worker registered:', reg.scope))
            .catch(err => console.log('[PWA] Service worker registration failed:', err.message))
